# Server
server.port=8080

# Database - H2 (easy local dev; swap for PostgreSQL below)
spring.datasource.url=jdbc:h2:mem:financedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=financeDashboardSecretKey2024SuperLongAndSecureKeyForHMACSHA256Algorithm
app.jwt.expiration-ms=86400000

# Logging
logging.level.com.finance=DEBUG
logging.level.org.springframework.security=DEBUG

